<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Raffia | Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container">
            <img src="Logo atelier raffia byn.jpg" alt="Atelier Raffia Logo" class="logo">
        </div>
        <ul class="nav-links">
            <li><a href="#coleccion">Colecciones</a></li>
            <li><a href="#historia">Historia</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

    <main class="content">
        
        <section id="coleccion" class="grid-catalogo">
            <div class="item-prenda">
                <div class="image-wrapper">
                    <img src="tu-foto-1.jpg" alt="Prenda Atelier Raffia">
                </div>
                <div class="descripcion">
                    <h3>Nombre de la Prenda</h3>
                    <p>Descripción técnica: Proceso artesanal bajo sistema Müller.</p>
                </div>
            </div>
            </section>

        <section id="historia" class="seccion-texto">
            <h2>Historia</h2>
            <p>Atelier Raffia nace de la pasión por la sastrería técnica y el diseño consciente...</p>
        </section>

        <section id="contacto" class="seccion-texto">
            <h2>Contacto</h2>
            <div class="rrss">
                <a href="https://wa.me/tu-numero" target="_blank">WhatsApp</a>
                <a href="https://instagram.com/tu-usuario" target="_blank">Instagram</a>
            </div>
        </section>

    </main>

</body>
</html>
