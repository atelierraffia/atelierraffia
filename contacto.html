<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Raffia | Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo-container">
            <a href="index.html"><img src="logo-atelier.jpg" alt="Atelier Raffia" class="logo"></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Colección</a></li>
            <li><a href="historia.html">Historia</a></li>
            <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
    </nav>

    <main class="content">
        <h2 class="section-title">Inquiries</h2>
        
        <div class="social-box">
            <h3 class="subtitle">Social</h3>
            <a href="https://www.instagram.com/atelierraffia" target="_blank" class="instagram-link">@atelierraffia</a>
        </div>

        <div class="form-box">
            <h3 class="subtitle">E-mail</h3>
            <form action="https://formspree.io/f/atelierraffia@gmail.com" method="POST" class="contact-form">
                <div class="input-group">
                    <label>Remitente</label>
                    <input type="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="input-group">
                    <label>Asunto</label>
                    <input type="text" name="subject" placeholder="Consulta sobre modelo..." required>
                </div>
                <div class="input-group">
                    <label>Mensaje</label>
                    <textarea name="message" rows="5" placeholder="Escribe aquí tu mensaje..." required></textarea>
                </div>
                <button type="submit">Enviar Mensaje</button>
            </form>
        </div>
    </main>
</body>
</html>
