<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Atelier Raffia</title>
    <style>
        /* Estilos base inspirados en diseño de lujo */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 100px;
        }

        .logo {
            font-size: 24px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
            font-weight: 300;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            font-weight: 400;
        }

        /* Estilo para Redes Sociales */
        .social-section {
            margin-bottom: 80px;
        }

        .social-link {
            display: inline-block;
            color: #000;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 0.1em;
            transition: opacity 0.3s ease;
        }

        .social-link:hover {
            opacity: 0.6;
        }

        /* Estilo para el Formulario */
        .form-section {
            margin-top: 60px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
        }

        input, textarea {
            border: none;
            border-bottom: 1px solid #000;
            padding: 10px 0;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            background: transparent;
        }

        input:focus, textarea:focus {
            border-bottom-width: 2px;
        }

        button {
            margin-top: 20px;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: background 0.3s ease;
            align-self: flex-start;
        }

        button:hover {
            background-color: #333;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: #999;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo">Atelier Raffia</a>
        </header>

        <main>
            <section class="social-section">
                <h2 class="section-title">Instagram</h2>
                <a href="https://www.instagram.com/atelierraffia" target="_blank" class="social-link">
                    @atelierraffia
                </a>
            </section>

            <section class="form-section">
                <h2 class="section-title">Enviar un Mensaje</h2>
                
                <form action="https://formspree.io/f/xzdywder" method="POST" class="contact-form">
                    
                    <div class="input-group">
                        <label for="email">E-mail de contacto</label>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                    </div>

                    <div class="input-group">
                        <label for="subject">Asunto</label>
                        <input type="text" id="subject" name="_subject" placeholder="Consulta sobre pieza artesanal" required>
                    </div>

                    <div class="input-group">
                        <label for="message">Mensaje</label>
                        <textarea id="message" name="message" rows="4" placeholder="Escribe tu consulta aquí..." required></textarea>
                    </div>

                    <input type="hidden" name="_gotcha" style="display:none">

                    <button type="submit">Enviar</button>
                </form>
            </section>
        </main>

        <footer>
            &copy; 2026 Atelier Raffia — Handmade for you.
        </footer>
    </div>

</body>
</html>
