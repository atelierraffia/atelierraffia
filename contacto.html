<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto — Atelier Raffia</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Estilos específicos para que el formulario se vea de lujo */
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 40px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #666;
        }

        .input-group input, .input-group textarea {
            border: none;
            border-bottom: 1px solid #000;
            padding: 8px 0;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            background: transparent;
        }

        .social-link-box {
            margin-bottom: 50px;
            text-align: center;
        }

        .instagram-button {
            text-decoration: none;
            color: #000;
            font-size: 18px;
            letter-spacing: 1px;
            border-bottom: 1px solid #000;
            padding-bottom: 4px;
            transition: opacity 0.3s;
        }

        .instagram-button:hover {
            opacity: 0.5;
        }

        .submit-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html">Atelier Raffia</a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="coleccion.html">Colección</a></li>
            <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
    </nav>

    <main class="contact-container">
        <div class="social-link-box">
            <p style="font-size: 12px; letter-spacing: 2px; color: #999; text-transform: uppercase;">Instagram</p>
            <a href="https://www.instagram.com/atelierraffia" target="_blank" class="instagram-button">
                @atelierraffia
            </a>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">

        <div class="form-box">
            <p style="font-size: 12px; letter-spacing: 2px; color: #999; text-transform: uppercase; text-align: center;">E-mail</p>
            
            <form action="https://formspree.io/f/xzdywder" method="POST" class="contact-form">
                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" name="name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="input-group">
                    <label>Mensaje</label>
                    <textarea name="message" rows="4" required></textarea>
                </div>

                <input type="hidden" name="_gotcha" style="display:none">
                <button type="submit" class="submit-btn">Enviar Consulta</button>
            </form>
        </div>
    </main>

</body>
</html>
