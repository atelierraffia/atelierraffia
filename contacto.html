<section class="contact-section">
    <div class="contact-container">
        <div class="contact-info">
            <h2>Contacto</h2>
            <p>Para consultas sobre pedidos personalizados o atención al cliente, por favor completa el formulario.</p>
            <ul class="details">
                <li><strong>Email:</strong> hola@tuweb.com</li>
                <li><strong>Ubicación:</strong> Buenos Aires, Argentina</li>
            </ul>
        </div>

        <form id="contact-form" class="contact-form">
            <div class="form-group">
                <input type="text" id="name" name="name" placeholder="Nombre completo" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
            </div>
            <div class="form-group">
                <select id="subject" name="subject">
                    <option value="consulta">Consulta General</option>
                    <option value="pedido">Pedido por encargo</option>
                    <option value="prensa">Prensa / Colaboraciones</option>
                </select>
            </div>
            <div class="form-group">
                <textarea id="message" name="message" rows="5" placeholder="Tu mensaje..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Enviar Mensaje</button>
        </form>
    </div>
</section>
