<section id="contacto" class="seccion">
    <h2>Contacto</h2>
    
    <div class="rrss-links">
        <a href="https://www.instagram.com/atelierraffia" target="_blank">Instagram: @atelierraffia</a>
        <a href="mailto:atelierraffia@gmail.com">Email: atelierraffia@gmail.com</a>
    </div>

    <form action="https://formspree.io/f/xzdywder" method="POST" class="contact-form">
        <div class="input-group">
            <label>Nombre</label>
            <input type="text" name="name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="input-group">
            <label>Mensaje</label>
            <textarea name="message" rows="4" required></textarea>
        </div>

        <input type="hidden" name="_gotcha" style="display:none">

        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
    </form>
</section>
